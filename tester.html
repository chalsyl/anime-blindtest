<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Broken Video Detector</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #e94560;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent);
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        /* Panneau de configuration moderne */
        .setting-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .setting-item label {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(15, 23, 42, 0.3);
            padding: 12px;
            border-radius: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0f172a;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, #bd2f49 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            filter: brightness(0.7);
        }

        .status-box {
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #status {
            color: var(--success);
            transition: color 0.3s;
        }

        /* Grille des vidéos cassées uniquement */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-title {
            margin: 10px 0;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-color);
            text-align: center;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6em;
        }

        .error-badge {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            margin-top: auto;
        }

        #temp-players {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        @media (max-width: 900px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Broken Video Detector</h1>
        <p>Analyse ciblée en tâche de fond pour identifier les vidéos défectueuses de votre base de données.</p>
        <br>

        <!-- PANNEAU DE CONFIGURATION -->
        <div class="setting-box">
            <div class="setting-item">
                <label for="start-id-input">Commencer à partir de l'ID :</label>
                <input type="number" id="start-id-input" value="1" min="1">
            </div>

            <div class="setting-item">
                <label>Erreurs à prendre en compte :</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-err150" checked>
                        Erreur 150 (Intégration interdite)
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-err100" checked>
                        Erreur 100 (Supprimée ou Privée)
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-err2" checked>
                        Erreur 2 (ID invalide)
                    </label>
                    <label class="checkbox-item">
                        <!-- Décoché par défaut -->
                        <input type="checkbox" id="check-timeout">
                        Erreur de chargement (Timeout)
                    </label>
                </div>
            </div>

            <button id="start-btn" class="btn" disabled>Lancer l'analyse</button>
        </div>

        <div class="status-box">
            Statut : <span id="status">Initialisation...</span>
        </div>
    </header>

    <main class="video-grid" id="video-grid">
        <!-- Rempli dynamiquement -->
    </main>

    <div id="temp-players"></div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const BATCH_SIZE = 4; 
        let animeDatabase = [];
        let youtubeVideos = [];
        let currentIndex = 0;
        let totalToTest = 0;
        let testedCount = 0;
        let brokenCount = 0;

        // Étape 1 : Attendre que l'API soit prête et charger le JSON de manière passive
        window.onYouTubeIframeAPIReady = async function() {
            document.getElementById('status').innerText = "Chargement de la base anime.json...";
            try {
                const response = await fetch('anime.json');
                if (!response.ok) throw new Error();
                animeDatabase = await response.json();
                
                // Active le bouton une fois les données chargées
                const startBtn = document.getElementById('start-btn');
                startBtn.removeAttribute('disabled');
                document.getElementById('status').innerText = "Prêt à lancer l'analyse.";
            } catch (error) {
                document.getElementById('status').innerText = "Erreur : Fichier anime.json introuvable.";
                document.getElementById('status').style.color = "var(--error)";
            }
        };

        // Étape 2 : Écouteur de clic sur le bouton de démarrage
        document.getElementById('start-btn').addEventListener('click', () => {
            const startId = parseInt(document.getElementById('start-id-input').value) || 1;

            // Filtrer pour ne garder que les IDs supérieurs ou égaux à l'ID configuré
            youtubeVideos = animeDatabase.filter(item => {
                const id = item.YoutubeId || item.youtubeId;
                const itemDbId = parseInt(item.id) || 0;
                return id && !id.startsWith('http') && itemDbId >= startId;
            });

            totalToTest = youtubeVideos.length;
            testedCount = 0;
            brokenCount = 0;
            currentIndex = 0;

            // Réinitialiser la grille d'affichage
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            if (totalToTest === 0) {
                document.getElementById('status').innerText = "Aucun morceau YouTube trouvé avec cet ID de départ.";
                return;
            }

            // Désactiver le bouton pendant le processus
            document.getElementById('start-btn').setAttribute('disabled', 'true');
            document.getElementById('status').style.color = "var(--success)";
            document.getElementById('status').innerText = `Démarrage de l'analyse (0/${totalToTest})...`;

            // Lancer le lot de tests initial
            for (let i = 0; i < BATCH_SIZE; i++) {
                testNext();
            }
        });

        // Étape 3 : Gérer la file d'attente
        function testNext() {
            if (currentIndex >= youtubeVideos.length) {
                return; 
            }

            const index = currentIndex++;
            const video = youtubeVideos[index];

            testSingleVideo(video, (isBroken, errorCode) => {
                testedCount++;
                
                let shouldReport = false;
                let reportMsg = "";

                // Évaluation dynamique des options d'erreur cochées
                if (isBroken) {
                    const check150 = document.getElementById('check-err150').checked;
                    const check100 = document.getElementById('check-err100').checked;
                    const check2 = document.getElementById('check-err2').checked;
                    const checkTimeout = document.getElementById('check-timeout').checked;

                    if (errorCode === "150" && check150) {
                        shouldReport = true;
                        reportMsg = "Erreur 150 (Intégration interdite)";
                    } else if (errorCode === "100" && check100) {
                        shouldReport = true;
                        reportMsg = "Erreur 100 (Supprimée ou Privée)";
                    } else if (errorCode === "2" && check2) {
                        shouldReport = true;
                        reportMsg = "Erreur 2 (ID de vidéo invalide)";
                    } else if (errorCode === "timeout" && checkTimeout) {
                        shouldReport = true;
                        reportMsg = "Erreur de chargement (Timeout)";
                    }
                }

                if (shouldReport) {
                    brokenCount++;
                    renderBrokenVideo(video, reportMsg);
                }

                document.getElementById('status').innerText = `Analyse en cours... (${testedCount}/${totalToTest}) - ${brokenCount} cassées identifiées`;

                if (testedCount === totalToTest) {
                    document.getElementById('status').innerText = `Analyse terminée ! ${brokenCount} vidéos cassées identifiées sur ${totalToTest} vérifiées.`;
                    document.getElementById('status').style.color = brokenCount > 0 ? "var(--error)" : "var(--success)";
                    document.getElementById('start-btn').removeAttribute('disabled'); // Réactiver le bouton
                }

                testNext();
            });
        }

        // Étape 4 : Diagnostiquer une vidéo unique
        function testSingleVideo(video, onFinished) {
            const id = video.YoutubeId || video.youtubeId;
            const tempContainer = document.getElementById('temp-players');
            const playerDivId = `temp-player-${video.id}`;
            
            const div = document.createElement('div');
            div.id = playerDivId;
            tempContainer.appendChild(div);

            let finishedCalled = false;
            const finish = (isBroken, errorCode = "") => {
                if (finishedCalled) return;
                finishedCalled = true;

                clearTimeout(safetyTimeout);
                
                try {
                    player.destroy();
                } catch (e) {}
                div.remove();

                onFinished(isBroken, errorCode);
            };

            // Watchdog (4 secondes)
            const safetyTimeout = setTimeout(() => {
                finish(true, "timeout");
            }, 4000);

            const player = new YT.Player(playerDivId, {
                height: '1',
                width: '1',
                videoId: id,
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0
                },
                events: {
                    'onReady': () => {
                        const state = player.getPlayerState();
                        if (state === 5) {
                            finish(false);
                        }
                    },
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.BUFFERING) {
                            finish(false);
                        }
                    },
                    'onError': (event) => {
                        // On retourne le code d'erreur brut sous forme de chaîne de caractères
                        finish(true, String(event.data));
                    }
                }
            });
        }

        // Étape 5 : Afficher la carte en cas d'erreur cochée
        function renderBrokenVideo(video, errorCode) {
            const id = video.YoutubeId || video.youtubeId;
            const grid = document.getElementById('video-grid');
            
            if (grid.children.length === 1 && grid.children[0].tagName === 'P') {
                grid.innerHTML = '';
            }

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/${id}?autoplay=0&mute=1&controls=1" 
                        allow="autoplay; encrypted-media" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="video-title">${video.title} (ID: ${id})</div>
                <div class="error-badge">${errorCode}</div>
            `;
            grid.appendChild(card);
        }
    </script>
</body>
</html>
