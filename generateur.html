<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de base de données Anime</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #e94560;
            --text-color: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --warning: #f1c40f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(233, 69, 96, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(15, 52, 96, 0.1) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            color: var(--accent);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .step-box {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        .step-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            outline: none;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, #bd2f49 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .btn:hover {
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none !important;
            filter: brightness(0.6);
            box-shadow: none;
        }

        .btn.secondary {
            background: #0f3460;
            box-shadow: none;
        }

        .btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(15, 52, 96, 0.3);
        }

        #status-msg {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 10px;
            text-align: center;
        }

        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            display: none;
        }

        .success-box {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .warning-box {
            background: rgba(241, 196, 15, 0.15);
            border: 1px solid var(--warning);
            color: var(--warning);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Anime JSON Generator</h1>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px;">
            Ajoutez automatiquement des openings et endings à votre base de données locale via l'API stable d'AniList.
        </p>

        <!-- ÉTAPE 1 : SÉLECTION DU FICHIER -->
        <div class="step-box">
            <div class="step-title">Étape 1 : Charger votre fichier</div>
            <button id="btn-select-file" class="btn secondary">Sélectionner votre anime.json</button>
            <div id="status-msg">Fichier non sélectionné.</div>
        </div>

        <!-- ÉTAPE 2 : RECHERCHE DE L'ANIME -->
        <div class="step-box">
            <div class="step-title">Étape 2 : Ajouter l'animé</div>
            <input type="text" id="anime-name" placeholder="Saisissez le nom (ex: Stars Align)" disabled>
            <button id="btn-add-anime" class="btn" style="margin-top: 15px;" disabled>Ajouter OP et ED</button>
        </div>

        <!-- ÉCRAN DE RÉSULTATS -->
        <div id="result-box"></div>
    </div>

    <script>
        let fileHandle = null;
        let animeDatabase = [];
        const isSupportedFS = ('showOpenFilePicker' in window);

        const btnSelect = document.getElementById('btn-select-file');
        const inputName = document.getElementById('anime-name');
        const btnAdd = document.getElementById('btn-add-anime');
        const statusMsg = document.getElementById('status-msg');
        const resultBox = document.getElementById('result-box');

        // ÉTAPE 1 : SÉLECTIONNER ET CHARGER LE FICHIER LOCAL
        btnSelect.addEventListener('click', async () => {
            try {
                if (isSupportedFS) {
                    [fileHandle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'Fichier JSON',
                            accept: { 'application/json': ['.json'] }
                        }],
                        excludeAcceptAllOption: true,
                        multiple: false
                    });
                    const file = await fileHandle.getFile();
                    const text = await file.text();
                    animeDatabase = JSON.parse(text);
                    statusMsg.innerText = "✓ Fichier lié avec succès (Sauvegarde directe activée).";
                } else {
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.accept = '.json';
                    fileInput.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const text = await file.text();
                            animeDatabase = JSON.parse(text);
                            statusMsg.innerText = "✓ Fichier chargé (Vous téléchargerez le nouveau fichier à la fin).";
                            enableInputs();
                        }
                    };
                    fileInput.click();
                    return;
                }
                enableInputs();
            } catch (err) {
                console.error(err);
                statusMsg.innerText = "✗ Échec du chargement du fichier.";
            }
        });

        function enableInputs() {
            inputName.disabled = false;
            btnAdd.disabled = false;
        }

        function getBaseAnimeName(title) {
            return title.split(/ (?:OP|ED)\s?\d*/i)[0].trim();
        }

        // ÉTAPE 2 : APPELER L'API ET METTRE À JOUR LE FICHIER
        btnAdd.addEventListener('click', async () => {
            const searchName = inputName.value.trim();
            if (!searchName) return;

            btnAdd.disabled = true;
            btnAdd.innerText = "Recherche AniList...";
            resultBox.style.display = "none";

            try {
                const query = `
                query ($search: String) {
                  Page(page: 1, perPage: 1) {
                    media(search: $search, type: ANIME) {
                      id
                      title {
                        romaji
                        english
                      }
                      coverImage {
                        extraLarge
                        large
                      }
                      genres
                      tags {
                        name
                        category
                      }
                    }
                  }
                }
                `;

                const variables = { search: searchName };

                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({ query: query, variables: variables })
                });

                if (!response.ok) {
                    throw new Error(`Erreur API: ${response.status}`);
                }

                const result = await response.json();
                const mediaList = result.data?.Page?.media;

                if (!mediaList || mediaList.length === 0) {
                    showResult(false, ["Animé introuvable sur AniList."]);
                    return;
                }

                const anime = mediaList[0];
                const animeTitle = anime.title.english || anime.title.romaji;

                const opTitle = `${animeTitle} OP 1`;
                const edTitle = `${animeTitle} ED 1`;

                let notes = [];
                let added = [];

                const opExists = animeDatabase.some(item => item.title.toLowerCase() === opTitle.toLowerCase());
                const edExists = animeDatabase.some(item => item.title.toLowerCase() === edTitle.toLowerCase());

                if (opExists) notes.push(`L'Opening "${opTitle}" existe déjà.`);
                if (edExists) notes.push(`L'Ending "${edTitle}" existe déjà.`);

                if (opExists && edExists) {
                    showResult(false, notes);
                    return;
                }

                let lastId = animeDatabase.length > 0 ? Math.max(...animeDatabase.map(item => item.id)) : 0;

                const genres = anime.genres || [];
                
                // Extraction de tous les tags de types "Thèmes" et "Démographiques" (ex: Shounen, School...)
                const finalThemes = anime.tags 
                    ? anime.tags
                        .filter(tag => tag.category === "Theme" || tag.category === "Demographic")
                        .map(tag => tag.name)
                    : [];

                const image = anime.coverImage?.extraLarge || anime.coverImage?.large || "";

                if (!opExists) {
                    lastId++;
                    animeDatabase.push({
                        id: lastId,
                        title: opTitle,
                        type: "OP",
                        image: image,
                        genres: genres,
                        themes: finalThemes,
                        YoutubeId: ""
                    });
                    added.push(opTitle);
                }

                if (!edExists) {
                    lastId++;
                    animeDatabase.push({
                        id: lastId,
                        title: edTitle,
                        type: "ED",
                        image: image,
                        genres: genres,
                        themes: finalThemes,
                        YoutubeId: ""
                    });
                    added.push(edTitle);
                }

                // --- OPTIMISATION DU STRINIGIFY POUR RETOURNER LES TABLEAUX EN SÉRIE ---
                // Formate les tableaux "themes" et "genres" sur une seule ligne
                const formattedJson = JSON.stringify(animeDatabase, null, 2)
                    .replace(/\[\s*\n\s*("[^"]*"(?:,\s*\n\s*"[^"]*")*)\s*\n\s*\]/g, (match, p1) => {
                        return '[' + p1.replace(/\s*\n\s*/g, ' ') + ']';
                    });

                // Écriture / Enregistrement
                if (isSupportedFS && fileHandle) {
                    const writable = await fileHandle.createWritable();
                    await writable.write(formattedJson);
                    await writable.close();
                } else {
                    const blob = new Blob([formattedJson], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'anime.json';
                    a.click();
                    URL.revokeObjectURL(url);
                }

                showResult(true, added, notes);
                inputName.value = "";

            } catch (err) {
                console.error(err);
                showResult(false, ["Erreur de connexion avec le serveur d'AniList."]);
            } finally {
                btnAdd.disabled = false;
                btnAdd.innerText = "Ajouter OP et ED";
            }
        });

        function showResult(success, list, notes = []) {
            resultBox.style.display = "block";
            if (success) {
                resultBox.className = "success-box";
                let html = "<strong>Ajout réussi !</strong><br>";
                html += list.map(title => "• " + title).join("<br>");
                if (notes.length > 0) {
                    html += "<br><br><strong>Note :</strong><br>" + notes.map(note => "⚠ " + note).join("<br>");
                }
                resultBox.innerHTML = html;
            } else {
                resultBox.className = "warning-box";
                resultBox.innerHTML = "<strong>Attention :</strong><br>" + list.map(note => "⚠ " + note).join("<br>");
            }
        }
    </script>
</body>
</html>
